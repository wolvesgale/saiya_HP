<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 150" fill="none">
  <!-- 株式会社 -->
  <text
    x="168" y="28"
    font-family="'Noto Serif JP', 'Hiragino Mincho Pro', Georgia, serif"
    font-size="10"
    letter-spacing="5"
    fill="#1a1a1a"
    text-anchor="middle">株式会社</text>

  <!-- Saiya main logotype - large italic serif -->
  <text
    x="166" y="112"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="400"
    font-size="88"
    fill="#1a1a1a"
    text-anchor="middle">Saiya</text>

  <!-- Swoosh underline: starts lower-left, sweeps up to upper-right (like the sketch) -->
  <path
    d="M 6 132 C 50 152, 210 156, 334 92"
    stroke="#1a1a1a"
    stroke-width="2.2"
    stroke-linecap="round"
    fill="none"/>
</svg>
