<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 180" width="360" height="180">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Pinyon+Script&amp;display=swap');
    </style>
  </defs>

  <!-- 楕円スウォッシュ（手書き風・わずかに傾き） -->
  <ellipse cx="175" cy="105" rx="155" ry="62"
           fill="none" stroke="#1a1a1a" stroke-width="2.2"
           stroke-linecap="round"
           transform="rotate(-4, 175, 105)"/>

  <!-- 株式会社 -->
  <text x="175" y="42"
        text-anchor="middle"
        font-family="'Helvetica Neue', 'Hiragino Sans', Arial, sans-serif"
        font-size="13"
        fill="#1a1a1a"
        letter-spacing="5">株式会社</text>

  <!-- Saiya メインロゴ -->
  <text x="175" y="125"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-weight="normal"
        font-size="68"
        fill="#1a1a1a"
        letter-spacing="-1">Saiya</text>

</svg>
